<!DOCTYPE html>
<html>
<head>
    <title>Search Results</title>
<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <a href="/" class="home"> Home</a>


    <div class="b">

    <form action="/search" method="GET">

    <input
        type="text"
        name="query"
        value="{{ query }}"
        required
    >

    <button type="submit">
        Search
    </button>

</form>

    <h1>Search Results</h1>

    <h3>Query: {{ query }}</h3>

    <hr>
{% if results %}

    <h3>{{ count }} results found</h3>

    {% for result in results %}

        <div class="result">

            <h3>{{ result.title }}</h3>

            <a href="{{ result.url }}" target="_blank">
                {{ result.url }}
            </a>

            <p>
                <strong>Score:</strong>
                {{ result.score }}
            </p>

            <p>
                {{ result.preview }}
            </p>

        </div>

        <hr>

    {% endfor %}

{% else %}

    <h3>No Results Found</h3>

{% endif %}

    </div>

</body>
</html>
